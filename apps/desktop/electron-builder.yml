appId: com.kara.desktop
productName: Kara Desktop

directories:
    output: release

files:
    - dist/**
    - package.json

extraResources:
    - from: ../web/dist
      to: web

mac:
    target:
        - dmg
        - zip
    category: public.app-category.productivity

win:
    target:
        - nsis
        - portable

nsis:
    oneClick: false
    allowToChangeInstallationDirectory: true

linux:
    target:
        - AppImage
    category: Utility
